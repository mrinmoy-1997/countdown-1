<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Adventure Begins!</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: 'Segoe UI', sans-serif;
            color: #444;
            text-align: center;
        }
        h1 { font-size: 2.2rem; margin-bottom: 5px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        p { font-size: 1.1rem; margin-bottom: 25px; color: #fff; }
        #countdown { display: flex; gap: 10px; }
        .time-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            min-width: 65px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .number { font-size: 2rem; font-weight: bold; display: block; color: #ff6b6b; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: #888; }
    </style>
</head>
<body>
    <h1>Our Trip is Loading... ✈️</h1>
    <p>Counting down to May 9!</p>
    <div id="countdown">
        <div class="time-box"><span class="number" id="days">00</span><span class="label">Days</span></div>
        <div class="time-box"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
        <div class="time-box"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
        <div class="time-box"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
    </div>
    <script>
        const targetDate = new Date("May 9, 2026 00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
